<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI営業LINE 管理画面</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      background: #f8fafc;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    h1, h2 {
      margin-top: 0;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
      margin-top: 12px;
      margin-right: 8px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #0f766e;
    }
    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>AI営業LINE 管理画面</h1>
  <p class="muted">自動返信のON/OFF、返信モード、予約URL、商品説明を管理できます。</p>

  <div class="card">
    <h2>自動返信設定</h2>
    <label>
      <input type="checkbox" id="autoReply" />
      自動返信をONにする
    </label>
    <br /><br />
    <label>
      <input type="checkbox" id="humanOnly" />
      人間対応のみ
    </label>
  </div>

  <div class="card">
    <h2>返信モード</h2>
    <select id="promptMode">
      <option value="soft">やさしめ</option>
      <option value="sales">営業モード</option>
      <option value="reserve">予約誘導</option>
      <option value="faq">FAQ重視</option>
    </select>
  </div>

  <div class="card">
    <h2>予約URL</h2>
    <input id="bookingUrl" placeholder="https://example.com/book" />
  </div>

  <div class="card">
    <h2>商品説明</h2>
    <textarea id="productMessage" rows="4"></textarea>
  </div>

  <div class="card">
    <h2>FAQ</h2>
    <textarea id="faqJson" rows="10" placeholder='[{"q":"何ができますか？","a":"..."}]'></textarea>
    <p class="muted">FAQはJSON形式で編集します。</p>
  </div>

  <button onclick="loadSettings()">再読込</button>
  <button onclick="saveSettings()">保存</button>

  <div id="status" class="status"></div>

  <script>
    async function loadSettings() {
      try {
        const res = await fetch('/api/dashboard-settings');
        const data = await res.json();

        document.getElementById('autoReply').checked = !!data.autoReply;
        document.getElementById('humanOnly').checked = !!data.humanOnly;
        document.getElementById('promptMode').value = data.promptMode || 'sales';
        document.getElementById('bookingUrl').value = data.bookingUrl || '';
        document.getElementById('productMessage').value = data.productMessage || '';
        document.getElementById('faqJson').value = JSON.stringify(data.faq || [], null, 2);

        document.getElementById('status').textContent = '設定を読み込みました';
      } catch (e) {
        document.getElementById('status').textContent = '読込に失敗しました';
      }
    }

    async function saveSettings() {
      try {
        const payload = {
          autoReply: document.getElementById('autoReply').checked,
          humanOnly: document.getElementById('humanOnly').checked,
          promptMode: document.getElementById('promptMode').value,
          bookingUrl: document.getElementById('bookingUrl').value,
          productMessage: document.getElementById('productMessage').value,
          faq: JSON.parse(document.getElementById('faqJson').value || '[]')
        };

        const res = await fetch('/api/dashboard-settings', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('save failed');

        document.getElementById('status').textContent = '保存しました';
      } catch (e) {
        document.getElementById('status').textContent = '保存に失敗しました。FAQのJSON形式も確認してください。';
      }
    }

    loadSettings();
  </script>
</body>
</html>
